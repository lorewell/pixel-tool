<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素大师 - 调色板抠图工具</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --card: #2b2b3b;
            --text: #cdd6f4;
            --accent: #89b4fa;
            --danger: #f38ba8;
            --success: #a6e3a1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            margin: 0;
        }

        .container { 
            background: var(--card); padding: 30px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); width: 95%; max-width: 1000px; 
        }

        header { border-bottom: 1px solid #444; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .main-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        
        /* 画布区域 */
        .viewport { 
            flex: 1; min-width: 300px; background: #111; border-radius: 12px;
            position: relative; display: flex; align-items: center; justify-content: center;
            min-height: 450px; border: 2px solid #444;
            /* 透明背景网格 */
            background-image: linear-gradient(45deg, #181818 25%, transparent 25%), linear-gradient(-45deg, #181818 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #181818 75%), linear-gradient(-45deg, transparent 75%, #181818 75%);
            background-size: 16px 16px; background-position: 0 0, 0 8px, 8px 8px, 8px 0;
        }
        canvas { image-rendering: pixelated; max-width: 100%; max-height: 70vh; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* 控制面板 */
        .panel { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        
        .palette-container { 
            background: #181825; border-radius: 8px; padding: 15px; 
            height: 350px; overflow-y: auto; border: 1px solid #444;
        }

        .color-row { 
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
            background: #313244; padding: 8px; border-radius: 6px; border: 1px solid transparent;
        }
        .color-row:hover { border-color: var(--accent); }

        .swatch { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #000; flex-shrink: 0; }
        .hex { font-family: monospace; font-size: 13px; flex-grow: 1; }
        .count { font-size: 11px; color: #9399b2; margin-right: 10px; }

        /* 按钮样式 */
        .btn { 
            padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-upload { background: var(--accent); color: #1e1e2e; }
        .btn-download { background: var(--success); color: #1e1e2e; margin-top: 10px; }
        .btn-remove { background: var(--danger); color: white; padding: 4px 8px; font-size: 11px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn:active { transform: translateY(0); }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0;">👾 像素大师 - 专业抠图</h2>
        <label for="file-input" class="btn btn-upload">📁 上传像素图</label>
        <input type="file" id="file-input" accept="image/*">
    </header>

    <div class="main-layout">
        <div class="viewport">
            <canvas id="canvas"></canvas>
            <div id="placeholder" style="color:#555;">等待上传图片...</div>
        </div>

        <div class="panel">
            <div style="font-weight:bold; margin-bottom:5px;">调色板分析 (自动提取)</div>
            <div class="palette-container" id="palette-list">
                </div>
            
            <button id="download-btn" class="btn btn-download" style="display: none;">
                💾 保存透明 PNG
            </button>
            <p style="font-size: 12px; color: #9399b2; line-height: 1.4;">
                * 提示：点击列表中的“剔除”按钮，会将图中对应的颜色全部转为透明。适合处理纯色背景。
            </p>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const paletteList = document.getElementById('palette-list');
    const downloadBtn = document.getElementById('download-btn');
    const placeholder = document.getElementById('placeholder');

    let originalImageData = null;

    // 1. 文件上传处理
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                placeholder.style.display = 'none';
                downloadBtn.style.display = 'inline-flex';
                
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                analyzePalette();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 2. 核心算法：分析图片中所有不重复的颜色
    function analyzePalette() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const colorCounts = {};

        for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] === 0) continue; // 跳过已经是透明的像素
            
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            const rgb = `${r},${g},${b}`;
            
            colorCounts[rgb] = (colorCounts[rgb] || 0) + 1;
        }

        // 排序并渲染
        const sortedColors = Object.entries(colorCounts).sort((a, b) => b[1] - a[1]);
        renderPalette(sortedColors);
    }

    // 3. 渲染右侧色板列表
    function renderPalette(colors) {
        paletteList.innerHTML = '';
        if (colors.length === 0) {
            paletteList.innerHTML = '<p style="color:#555; text-align:center;">暂无颜色数据</p>';
            return;
        }

        colors.forEach(([rgb, count]) => {
            const hex = rgbToHex(...rgb.split(',').map(Number));
            
            const row = document.createElement('div');
            row.className = 'color-row';
            row.innerHTML = `
                <div class="swatch" style="background: rgb(${rgb})"></div>
                <div class="hex">${hex}</div>
                <div class="count">${count} px</div>
                <button class="btn btn-remove" onclick="removeColor('${rgb}')">剔除</button>
            `;
            paletteList.appendChild(row);
        });
    }

    // 4. 剔除指定颜色（抠图核心逻辑）
    window.removeColor = function(targetRgb) {
        const [tr, tg, tb] = targetRgb.split(',').map(Number);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
            if (data[i] === tr && data[i+1] === tg && data[i+2] === tb) {
                data[i + 3] = 0; // 设置透明度为0
            }
        }
        
        ctx.putImageData(imgData, 0, 0);
        analyzePalette(); // 重新分析剩下颜色
    };

    // 5. 辅助函数：RGB转HEX
    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).toUpperCase().join('');
    }

    // 6. 下载 PNG 功能
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `pixel-cutout-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
